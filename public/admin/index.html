<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lika - 后台管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0f; color: #e4e4e7; min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    .sub { color: #71717a; font-size: 14px; margin-bottom: 32px; }

    .card {
      background: #18181b; border: 1px solid #27272a; border-radius: 12px;
      padding: 24px; margin-bottom: 20px;
    }
    label { display: block; font-size: 13px; font-weight: 600; color: #a1a1aa; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #27272a;
      background: #09090b; color: #e4e4e7; font-size: 14px; margin-bottom: 16px;
    }
    input:focus, textarea:focus { outline: none; border-color: #a78bfa; }
    textarea { min-height: 120px; font-family: monospace; resize: vertical; }
    .btn {
      padding: 10px 24px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-primary { background: #a78bfa; color: #fff; }
    .btn-primary:hover { background: #8b5cf6; }
    .btn-secondary { background: #27272a; color: #e4e4e7; }
    .btn-secondary:hover { background: #3f3f46; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-success { background: #22c55e; color: #fff; }
    .btn-success:hover { background: #16a34a; }

    .token-bar {
      background: #27272a; border-radius: 8px; padding: 12px 16px;
      display: flex; gap: 10px; align-items: center; margin-bottom: 24px;
    }
    .token-bar input { margin: 0; flex: 1; }

    .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; display: none; }
    .msg.success { display: block; background: #052e16; border: 1px solid #166534; color: #86efac; }
    .msg.error { display: block; background: #450a0a; border: 1px solid #991b1b; color: #fca5a5; }

    .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hidden { display: none; }

    .upload-area {
      border: 2px dashed #27272a; border-radius: 8px; padding: 20px;
      text-align: center; margin-bottom: 16px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-area:hover { border-color: #a78bfa; }
    .upload-area.dragover { border-color: #a78bfa; background: #1a1a2e; }
    .upload-area p { color: #71717a; font-size: 13px; margin-top: 8px; }
    .image-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .image-item {
      position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
      border: 1px solid #27272a; cursor: pointer;
    }
    .image-item img { width: 100%; height: 100%; object-fit: cover; }
    .image-item:hover { border-color: #a78bfa; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Lika 后台</h1>
    <p class="sub">写文章、传图片、管理内容</p>

    <div id="msg" class="msg"></div>

    <!-- Token -->
    <div class="token-bar">
      <input type="password" id="tokenInput" placeholder="输入 GitHub Token（repo 权限）" />
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>

    <!-- 主界面 -->
    <div id="mainUI" class="hidden">
      <!-- 图片管理 -->
      <div class="card">
        <div class="flex" style="justify-content:space-between;margin-bottom:12px">
          <h2>🖼️ 图片管理</h2>
          <label class="btn btn-success" style="font-size:13px;cursor:pointer">
            + 上传图片
            <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="uploadImages(event)" />
          </label>
        </div>
        <div class="upload-area" id="dropZone" onclick="document.getElementById('imageInput').click()">
          <p>拖拽图片到此处 或 点击选择图片</p>
          <p style="font-size:12px;color:#52525b;">支持 PNG、JPG、GIF、WebP，建议压缩后上传</p>
        </div>
        <div id="imageList" class="image-list"></div>
      </div>

      <!-- 文章管理 -->
      <div class="card">
        <div class="flex" style="justify-content:space-between;margin-bottom:16px">
          <h2>📄 文章管理</h2>
          <button class="btn btn-primary" onclick="showEditor()">+ 新文章</button>
        </div>
        <div id="posts"></div>
      </div>
    </div>

    <!-- 编辑器 -->
    <div id="editor" class="hidden">
      <div class="card">
        <div class="flex" style="justify-content:space-between;margin-bottom:16px">
          <h2 id="editorTitle">写新文章</h2>
          <button class="btn btn-secondary" onclick="hideEditor()">← 返回</button>
        </div>
        <label>标题</label>
        <input id="postTitle" placeholder="文章标题" />
        <div class="row">
          <div>
            <label>发布日期</label>
            <input type="date" id="postDate" />
          </div>
          <div>
            <label>标签（逗号分隔）</label>
            <input id="postTags" placeholder="React, 前端" />
          </div>
        </div>
        <label>简介</label>
        <textarea id="postExcerpt" placeholder="文章简介..." rows="2"></textarea>
        <label>正文（Markdown）</label>
        <div class="flex" style="margin-bottom:8px">
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertTag('**','**')"><b>粗体</b></button>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertTag('*','*')"><i>斜体</i></button>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertTag('## ','')">标题</button>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertTag('```\n','\n```')">代码块</button>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertTag('- ','')">列表</button>
          <button class="btn btn-secondary" style="font-size:12px;padding:6px 12px" onclick="insertImage()">🖼️ 图片</button>
        </div>
        <textarea id="postBody" placeholder="写文章内容，支持 Markdown 格式..." rows="16"></textarea>
        <div class="flex">
          <button class="btn btn-primary" onclick="publishPost()">📤 发布文章</button>
          <span id="publishStatus" style="color:#71717a;font-size:13px"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let token = localStorage.getItem("gh_token") || "";
    let editingSlug = null;
    const repo = "Licardo10/my-personal-site";
    const branch = "main";
    const api = "https://api.github.com";

    // ====== 工具函数 ======
    function b64Encode(str) { const e=new TextEncoder().encode(str); let b=""; for(let i=0;i<e.length;i++) b+=String.fromCharCode(e[i]); return btoa(b); }
    function b64Decode(str) { const b=atob(str.replace(/\n/g,"")); const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++) u[i]=b.charCodeAt(i); return new TextDecoder().decode(u); }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = "msg " + type;
      setTimeout(() => { msg.style.display = "none"; }, 5000);
    }

    function saveToken() {
      const val = document.getElementById("tokenInput").value.trim();
      if (val) { localStorage.setItem("gh_token", val); token = val; showMsg("Token 已保存", "success"); init(); }
    }

    document.getElementById("tokenInput").value = token;
    if (token) init();

    async function gh(url, method = "GET", body = null) {
      const res = await fetch(api + url, {
        method, body: body ? JSON.stringify(body) : null,
        headers: { Authorization: "token " + token, Accept: "application/vnd.github.v3+json" }
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error("GitHub API: " + res.status + " - " + err);
      }
      return res.status === 204 ? null : await res.json();
    }

    // ====== 初始化 ======
    async function init() {
      document.getElementById("mainUI").classList.remove("hidden");
      loadPosts();
      loadImages();
      setupDragDrop();
    }

    // ====== 拖拽上传 ======
    function setupDragDrop() {
      const dz = document.getElementById("dropZone");
      dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("dragover"); });
      dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
      dz.addEventListener("drop", e => {
        e.preventDefault();
        dz.classList.remove("dragover");
        if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
      });
    }

    async function uploadImages(e) {
      if (e.target.files.length) handleFiles(e.target.files);
      e.target.value = "";
    }

    async function handleFiles(files) {
      for (const file of files) {
        if (!file.type.startsWith("image/")) continue;
        const reader = new FileReader();
        reader.onload = async function (ev) {
          const base64 = ev.target.result.split(",")[1];
          const name = Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "");
          try {
            await gh("/repos/" + repo + "/contents/public/images/" + name, "PUT", {
              message: "上传图片: " + name,
              content: base64, branch
            });
            showMsg("✅ 已上传: " + name, "success");
            loadImages();
          } catch (err) { showMsg("上传失败: " + name + " - " + err.message, "error"); }
        };
        reader.readAsDataURL(file);
      }
    }

    // ====== 加载图片 ======
    async function loadImages() {
      try {
        const data = await gh("/repos/" + repo + "/contents/public/images");
        const container = document.getElementById("imageList");
        if (Array.isArray(data)) {
          const imgs = data.filter(f => /\.(png|jpe?g|gif|webp|svg)$/i.test(f.name));
          if (imgs.length === 0) { container.innerHTML = '<p style="color:#71717a;font-size:13px">还没有图片</p>'; return; }
          container.innerHTML = "";
          for (const img of imgs) {
            const div = document.createElement("div");
            div.className = "image-item";
            div.title = "点击复制: /images/" + img.name;
            div.onclick = function () {
              navigator.clipboard.writeText("/images/" + img.name).then(() => {
                showMsg("已复制: /images/" + img.name, "success");
              });
            };
            div.innerHTML = '<img src="https://raw.githubusercontent.com/' + repo + '/main/public/images/' + img.name + '" alt="' + img.name + '" loading="lazy" />';
            container.appendChild(div);
          }
        } else {
          container.innerHTML = '<p style="color:#71717a;font-size:13px">还没有图片</p>';
        }
      } catch (e) { /* images dir may not exist */ document.getElementById("imageList").innerHTML = '<p style="color:#71717a;font-size:13px">还没有图片</p>'; }
    }

    // ====== 文章 ======
    async function loadPosts() {
      try {
        const data = await gh("/repos/" + repo + "/contents/content/posts");
        const container = document.getElementById("posts");
        if (Array.isArray(data)) {
          const mdFiles = data.filter(f => f.name.endsWith(".md")).reverse();
          if (mdFiles.length === 0) { container.innerHTML = '<p style="color:#71717a">还没有文章</p>'; return; }
          container.innerHTML = "";
          for (const file of mdFiles) {
            const content = await gh("/repos/" + repo + "/contents/content/posts/" + file.name);
            const raw = b64Decode(content.content);
            const m = raw.match(/title:\s*"?([^"\n]+)/);
            const title = m ? m[1].trim() : file.name;
            const div = document.createElement("div");
            div.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #27272a";
            div.innerHTML = '<span>' + title + '</span>' +
              '<div class="flex">' +
              '<button class="btn btn-secondary" style="padding:6px 14px;font-size:12px" onclick="editPost(\'' + file.name + '\')">编辑</button>' +
              '<button class="btn btn-danger" style="padding:6px 14px;font-size:12px" onclick="deletePost(\'' + file.name + '\')">删除</button>' +
              '</div>';
            container.appendChild(div);
          }
        } else {
          container.innerHTML = '<p style="color:#71717a">还没有文章</p>';
        }
      } catch (e) {
        if (e.message.includes("401") || e.message.includes("403")) showMsg("Token 无效或没有权限", "error");
        else showMsg("加载失败: " + e.message, "error");
      }
    }

    function showEditor(slug) {
      editingSlug = slug || null;
      document.getElementById("editor").classList.remove("hidden");
      document.getElementById("mainUI").classList.add("hidden");
      document.getElementById("editorTitle").textContent = slug ? "编辑文章" : "写新文章";
      if (slug) loadPostForEdit(slug);
    }

    function hideEditor() {
      document.getElementById("editor").classList.add("hidden");
      document.getElementById("mainUI").classList.remove("hidden");
      document.getElementById("postTitle").value = "";
      document.getElementById("postDate").value = new Date().toISOString().split("T")[0];
      document.getElementById("postTags").value = "";
      document.getElementById("postExcerpt").value = "";
      document.getElementById("postBody").value = "";
      editingSlug = null;
    }

    document.getElementById("postDate").value = new Date().toISOString().split("T")[0];

    async function loadPostForEdit(slug) {
      try {
        const file = await gh("/repos/" + repo + "/contents/content/posts/" + slug);
        const raw = b64Decode(file.content);
        const parts = raw.split("---");
        if (parts.length >= 3) {
          const meta = parts[1];
          const body = parts.slice(2).join("---").trim();
          const title = meta.match(/title:\s*"?([^"\n]+)/);
          const date = meta.match(/date:\s*"?([^"\n]+)/);
          const tags = meta.match(/tags:\s*\[([^\]]+)\]/);
          const excerpt = meta.match(/excerpt:\s*"?([^"\n]+)/);
          if (title) document.getElementById("postTitle").value = title[1].trim();
          if (date) document.getElementById("postDate").value = date[1].trim();
          if (tags) document.getElementById("postTags").value = tags[1].split(",").map(t => t.trim().replace(/["']/g, "")).join(", ");
          if (excerpt) document.getElementById("postExcerpt").value = excerpt[1].trim();
          document.getElementById("postBody").value = body;
        }
        editingSlug = slug;
        document.getElementById("publishStatus").textContent = "（将覆盖原文件）";
      } catch (e) { showMsg("加载文章失败: " + e.message, "error"); }
    }

    // ====== 格式化工具栏 ======
    function insertTag(before, after) {
      const ta = document.getElementById("postBody");
      const start = ta.selectionStart, end = ta.selectionEnd;
      const text = ta.value;
      ta.value = text.slice(0, start) + before + text.slice(start, end) + after + text.slice(end);
      const pos = start + before.length + (end - start) + after.length;
      ta.selectionStart = ta.selectionEnd = pos - after.length;
      ta.focus();
    }

    function insertImage() {
      const ta = document.getElementById("postBody");
      const start = ta.selectionStart;
      ta.value = ta.value.slice(0, start) + "![图片描述](/images/图片文件名.jpg)" + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + 6;
      ta.focus();
    }

    // ====== 发布 ======
    async function publishPost() {
      const title = document.getElementById("postTitle").value.trim();
      const date = document.getElementById("postDate").value;
      const tagsStr = document.getElementById("postTags").value.trim();
      const excerpt = document.getElementById("postExcerpt").value.trim();
      const body = document.getElementById("postBody").value.trim();
      if (!title || !body) { showMsg("标题和正文不能为空", "error"); return; }

      const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : ["其他"];
      const slug = editingSlug || title.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fa5]+/g, "-").replace(/^-|-$/g, "") + ".md";

      const content = "---\n" +
        'title: "' + title + '"\n' +
        "date: " + date + "\n" +
        "tags: [" + tags.map(t => '"' + t + '"').join(", ") + "]\n" +
        'excerpt: "' + excerpt + '"\n' +
        "---\n\n" + body + "\n";

      const status = document.getElementById("publishStatus");
      status.textContent = "发布中...";

      try {
        let sha = null;
        if (editingSlug) {
          try {
            const existing = await gh("/repos/" + repo + "/contents/content/posts/" + editingSlug);
            sha = existing.sha;
          } catch (e) {}
        }
        await gh("/repos/" + repo + "/contents/content/posts/" + (editingSlug || slug), "PUT", {
          message: editingSlug ? "更新文章: " + title : "新文章: " + title,
          content: b64Encode(content), branch, sha
        });
        showMsg("✅ 文章已发布！等待自动部署...", "success");
        status.textContent = "✅ 已发布";
        hideEditor();
        loadPosts();
      } catch (e) { showMsg("发布失败: " + e.message, "error"); status.textContent = "❌ 失败"; }
    }

    function editPost(slug) { showEditor(slug); }

    async function deletePost(slug) {
      if (!confirm("确定删除 " + slug + "？")) return;
      try {
        const file = await gh("/repos/" + repo + "/contents/content/posts/" + slug);
        await gh("/repos/" + repo + "/contents/content/posts/" + slug, "DELETE", {
          message: "删除文章: " + slug, sha: file.sha, branch
        });
        showMsg("✅ 文章已删除", "success");
        loadPosts();
      } catch (e) { showMsg("删除失败: " + e.message, "error"); }
    }
  </script>
</body>
</html>
